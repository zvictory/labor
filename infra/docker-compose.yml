name: labor

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labor_dev}
      POSTGRES_USER: ${POSTGRES_USER:-labor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Postgres is NOT published to the host by default. Other compose services
    # reach it on the internal network at postgres:5432. For local dev host
    # access, copy docker-compose.override.yml.example to
    # docker-compose.override.yml.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    # Redis is NOT published to the host by default. See note on postgres
    # service above.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bundle exec rails server -b 0.0.0.0"
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-labor}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-labor_dev}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:3000"
    volumes:
      - backend_storage:/app/storage
      - backend_uploads:/app/public/uploads

  # Sidekiq is split into two processes so a 10k-row Telegram broadcast on
  # the LOW process cannot starve payment webhook processing on the HIGH
  # process. Each process gets its own AR connection pool sized via
  # RAILS_MAX_THREADS (see apps/backend/config/database.yml).
  sidekiq-high:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq_high.yml
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-labor}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-labor_dev}
      REDIS_URL: redis://redis:6379/0
      RAILS_MAX_THREADS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
      - backend_uploads:/app/public/uploads

  sidekiq-low:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq_low.yml
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-labor}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-labor_dev}
      REDIS_URL: redis://redis:6379/0
      RAILS_MAX_THREADS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
      - backend_uploads:/app/public/uploads

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      INTERNAL_API_URL: http://backend:3000
    depends_on:
      - backend
    ports:
      - "3001:3001"

  bot:
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      INTERNAL_API_URL: http://backend:3000
      REDIS_URL: redis://redis:6379/1
    depends_on:
      - backend
      - redis

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - backend

volumes:
  pgdata:
  redisdata:
  backend_storage:
  backend_uploads:
